name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
    - uses: actions/checkout@v4

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: UVC ${{ github.ref }}
        body: |
          ## UVC Camera Application

          ### Downloads
          - **macOS**: UVC-1.0.0.dmg
          - **Windows**: UVC-1.0.0.msi
          - **Linux**: UVC-1.0.0.deb
          - **Android**: androidApp-debug.apk

          ### Features
          - Real-time H.264/MJPEG video preview
          - Screenshot and video recording
          - Camera controls (brightness, contrast, etc.)
          - Multi-resolution support

          ### Requirements
          - **Desktop**: USB camera with UVC support
          - **Android**: Android 7.0+, USB OTG support
        draft: false
        prerelease: false

  build-macos:
    needs: create-release
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build macOS DMG
      run: ./gradlew :desktopApp:packageDmg
    - name: Upload DMG
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./desktopApp/build/compose/binaries/main/dmg/UVC-1.0.0.dmg
        asset_name: UVC-macOS-1.0.0.dmg
        asset_content_type: application/octet-stream

  build-windows:
    needs: create-release
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Windows MSI
      run: ./gradlew :desktopApp:packageMsi
    - name: Find MSI
      id: find-msi
      shell: bash
      run: |
        MSI=$(find desktopApp/build/compose/binaries/main -name "*.msi" | head -1)
        echo "msi_path=$MSI" >> $GITHUB_OUTPUT
    - name: Upload MSI
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ${{ steps.find-msi.outputs.msi_path }}
        asset_name: UVC-Windows-1.0.0.msi
        asset_content_type: application/octet-stream

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Linux DEB
      run: ./gradlew :desktopApp:packageDeb
    - name: Find DEB
      id: find-deb
      run: |
        DEB=$(find desktopApp/build/compose/binaries/main -name "*.deb" | head -1)
        echo "deb_path=$DEB" >> $GITHUB_OUTPUT
    - name: Upload DEB
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ${{ steps.find-deb.outputs.deb_path }}
        asset_name: UVC-Linux-1.0.0.deb
        asset_content_type: application/octet-stream

  build-android:
    needs: create-release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Build Android APK
      run: ./gradlew :androidApp:assembleRelease
    - name: Upload APK
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./androidApp/build/outputs/apk/release/androidApp-release-unsigned.apk
        asset_name: UVC-Android-1.0.0.apk
        asset_content_type: application/vnd.android.package-archive
